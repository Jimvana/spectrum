<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spectrum Wiki Reader</title>
  <style>
    :root {
      --bg: #10131a;
      --panel: #171b24;
      --line: #2b3242;
      --text: #e7ecf6;
      --muted: #8f9bb0;
      --accent: #62d6a5;
      --warn: #f5b759;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    main { min-width: 0; display: flex; flex-direction: column; }
    h1 { margin: 0; font-size: 15px; font-weight: 650; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 12px; line-height: 1.45; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #0f131b;
      color: var(--text);
      border-radius: 6px;
      padding: 9px 10px;
      outline: none;
      font-size: 13px;
    }
    input:focus { border-color: var(--accent); }
    .results {
      min-height: 0;
      overflow: auto;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }
    .result {
      width: 100%;
      display: block;
      text-align: left;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      overflow-wrap: anywhere;
    }
    .result:hover, .result.active { background: #222938; }
    .result small { display: block; color: var(--muted); margin-top: 2px; }
    .toolbar {
      border-bottom: 1px solid var(--line);
      background: #111722;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
    }
    .toolbar strong { font-size: 14px; overflow-wrap: anywhere; }
    .toolbar span { color: var(--muted); font-size: 12px; }
    .content {
      padding: 20px 24px;
      overflow: auto;
      line-height: 1.55;
      overflow-wrap: anywhere;
      font-size: 15px;
      max-width: 980px;
      width: 100%;
    }
    .content.source {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      max-width: none;
    }
    .content h2, .content h3, .content h4 {
      margin: 1.3em 0 0.45em;
      line-height: 1.2;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.2em;
    }
    .content h2 { font-size: 24px; }
    .content h3 { font-size: 19px; }
    .content h4 { font-size: 16px; }
    .content p { margin: 0 0 0.9em; }
    .content ul, .content ol { margin: 0 0 1em 1.4em; padding: 0; }
    .content a { color: var(--accent); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    .content blockquote {
      margin: 1em 0;
      padding-left: 1em;
      border-left: 3px solid var(--line);
      color: var(--muted);
    }
    .empty, .error {
      color: var(--muted);
      padding: 24px;
      font-family: inherit;
      white-space: normal;
    }
    .mode-btn {
      border: 1px solid var(--line);
      background: #0f131b;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 12px;
    }
    .mode-btn.active { border-color: var(--accent); color: var(--accent); }
    .error { color: var(--warn); }
    @media (max-width: 760px) {
      .shell { grid-template-columns: 1fr; }
      aside { max-height: 42vh; border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside>
      <div>
        <h1>Spectrum Wiki Reader</h1>
        <div id="index-meta" class="meta">Loading index...</div>
      </div>
      <input id="search" type="search" placeholder="Search titles" autocomplete="off">
      <div id="results" class="results"></div>
    </aside>
    <main>
      <div class="toolbar">
        <strong id="title">No page selected</strong>
        <span id="page-meta"></span>
        <button id="rendered-btn" class="mode-btn active" type="button">Rendered</button>
        <button id="source-btn" class="mode-btn" type="button">Source</button>
      </div>
      <div id="content" class="content empty">Select a page title to decode its article text from the .spec shard.</div>
    </main>
  </div>
  <script type="module" src="wiki.js"></script>
</body>
</html>
